<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christian Yohannes Lobo - Portfolio</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', 'Helvetica Neue', sans-serif;
            background-color: #0b101c;
            color: #fff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 0 10%;
            max-width: 1000px;
            margin: 0 auto;
            text-align: left; /* Membuat semua teks di main rata kiri */
        }

        .greeting {
            font-weight: 200;
            letter-spacing: 5px;
            color: #38bdf8;
            margin-bottom: 5px;
            font-size: 0.8em;
            text-transform: uppercase;
            opacity: 0.7;
        }

        h1 {
            font-size: 3.5em;
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1.1;
            color: #f8fafc;
        }

        .divider {
            width: 60px;
            height: 3px;
            background-color: #38bdf8;
            margin: 30px 0;
        }

        .description-container {
            max-width: 600px;
        }

        .description {
            font-weight: 300;
            color: #cbd5e1;
            font-size: 1.1em;
            margin: 0 0 15px 0;
            line-height: 1.6;
            letter-spacing: 0.5px;
        }

        .project-tag {
            font-weight: 400;
            color: #f1f5f9;
            font-size: 0.85em;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-left: 2px solid #38bdf8;
            padding-left: 10px;
        }

        footer {
            padding-bottom: 60px;
            text-align: center;
        }

        nav {
            display: flex;
            justify-content: center;
            gap: 50px;
        }

        nav a {
            text-decoration: none;
            color: #64748b;
            font-weight: 300;
            letter-spacing: 2px;
            font-size: 0.75em;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav a.active {
            color: #38bdf8;
            font-weight: 600;
            border-bottom: 2px solid #38bdf8;
            padding-bottom: 6px;
            opacity: 1;
        }
    </style>
</head>
<body>

    <main>
        <p class="greeting">Hello, I am</p>
        <h1>Christian Yohannes Lobo</h1>
        
        <div class="divider"></div>

        <div class="description-container">
            <p class="description">
                Sebuah portofolio digital sederhana sebagai representasi personal homepage dan proyek pengembangan web dasar HTML.
            </p>
            <p class="project-tag">Project.01-HTML . 2026</p>
        </div>
    </main>

    <footer>
        <nav>
            <a href="index.html" class="active">HOME</a>
            <a href="gallery.html">GALLERY</a>
            <a href="blog.html">BLOG</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </footer>

</body>
</html>
