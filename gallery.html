<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Christian Yohannes Lobo</title>

<body style="margin: 0; font-family: 'Segoe UI', 'Helvetica Neue', sans-serif; background-color: #0b101c; color: white; min-height: 100vh; display: flex; flex-direction: column; text-align: center;">

    <main style="flex: 1; padding: 80px 20px;">
        <p style="font-weight: 200; letter-spacing: 5px; color: #38bdf8; margin-bottom: 10px; font-size: 0.8em; text-transform: uppercase; opacity: 0.8;">
            Visual Journey
        </p>
        
        <h1 style="font-size: 3em; margin: 0 0 50px 0; font-weight: 700; letter-spacing: -1px; color: #f8fafc;">
            Gallery
        </h1>
        
        <section style="display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; max-width: 1200px; margin: 0 auto;">
            
            <figure style="margin: 0; max-width: 320px; text-align: left; background: #161e2d; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <img src="images/foto1.jpg" alt="Gunung Empung" style="width: 100%; border-radius: 4px; margin-bottom: 15px; filter: contrast(110%);">
                <figcaption>
                    <strong style="display: block; color: #38bdf8; font-size: 1.1em; letter-spacing: 0.5px; margin-bottom: 5px;">Mt Empung</strong>
                    <p style="margin: 0; font-size: 0.85em; color: #cbd5e1; font-weight: 300; line-height: 1.5;">
                        Pemandangan dari Gunung Empung di Sulawesi Utara. Tempat di mana udara segar dan hamparan hijau yang luas menyatu dalam harmoni alam yang menenangkan.
                    </p>
                </figcaption>
            </figure>

            <figure style="margin: 0; max-width: 320px; text-align: left; background: #161e2d; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <img src="images/foto2.jpg" alt="Pulau Sara" style="width: 100%; border-radius: 4px; margin-bottom: 15px; filter: contrast(110%);">
                <figcaption>
                    <strong style="display: block; color: #38bdf8; font-size: 1.1em; letter-spacing: 0.5px; margin-bottom: 5px;">Pulau Sara</strong>
                    <p style="margin: 0; font-size: 0.85em; color: #cbd5e1; font-weight: 300; line-height: 1.5;">
                        Menikmati jernihnya air laut di Pulau Sara, Kepulauan Talaud. Pasir putih yang bersih menjadikannya salah satu ikon kebanggaan di ujung utara Nusantara.
                    </p>
                </figcaption>
            </figure>

            <figure style="margin: 0; max-width: 320px; text-align: left; background: #161e2d; padding: 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05);">
                <img src="images/foto3.jpg" alt="Dermaga PLTU" style="width: 100%; border-radius: 4px; margin-bottom: 15px; filter: contrast(110%);">
                <figcaption>
                    <strong style="display: block; color: #38bdf8; font-size: 1.1em; letter-spacing: 0.5px; margin-bottom: 5px;">Dermaga PLTU</strong>
                    <p style="margin: 0; font-size: 0.85em; color: #cbd5e1; font-weight: 300; line-height: 1.5;">
                        Sisi lain keindahan Kepulauan Talaud di Dermaga PLTU. Garis pantai yang tenang berpadu dengan struktur dermaga yang estetik saat matahari mulai terbenam.
                    </p>
                </figcaption>
            </figure>

        </section>
    </main>
